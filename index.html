<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer Watch Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0b0b0b; color: #fff; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 400px; margin: 0 auto; background: #1a1a1a; padding: 25px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.8); border: 1px solid #333; }
        h1 { font-size: 22px; color: #00ffcc; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .status-box { background: #252525; padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 14px; border: 1px solid #444; }
        #status { color: #ff4444; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { 
            padding: 18px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer;
            background: #333; color: white; transition: all 0.2s; font-size: 13px;
        }
        button:active { transform: scale(0.92); filter: brightness(1.2); }
        .btn-main { background: #007bff; grid-column: span 2; font-size: 16px; padding: 20px; margin-bottom: 10px; }
        .btn-led { background: #6200ea; grid-column: span 2; border: 2px solid #7c4dff; }
        .btn-reloj { background: #2e7d32; border: 1px solid #4caf50; }
        .btn-crono { background: #c62828; }
        #log { margin-top: 20px; font-family: monospace; font-size: 11px; color: #00ffcc; opacity: 0.7; min-height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>👾 Gamer Watch</h1>
    
    <div class="status-box">
        Estado: <span id="status">DESCONECTADO</span>
    </div>

    <button class="btn-main" onclick="conectarBT()">🔗 VINCULAR RELOJ</button>

    <div class="grid">
        <button class="btn-reloj" onclick="enviar('R')">🏠 RELOJ</button>
        <button onclick="enviar('G')">📍 GPS</button>
        <button onclick="enviar('I')">📊 SISTEMA</button>
        <button onclick="enviar('C')">☁️ CLIMA</button>
        
        <button class="btn-led" id="btnLED" onclick="toggleLED()">💡 CONTROL LED: OFF</button>
        
        <button class="btn-crono" onclick="enviar('S')">▶️ START CRONO</button>
        <button class="btn-crono" onclick="enviar('P')">🛑 STOP CRONO</button>
    </div>

    <div id="log">Haz clic en Vincular para empezar</div>
</div>

<script>
    let dispositivoBT = null;
    let caracteristicaBT = null;
    let ledON = false;

    // UUIDs de Alerta (Compatibles con Chronos / InfiniTime)
    const SERVICE_UUID = "00001811-0000-1000-8000-00805f9b34fb"; 
    const CHAR_UUID    = "00002a46-0000-1000-8000-00805f9b34fb"; 

    async function conectarBT() {
        const statusEl = document.getElementById('status');
        const logEl = document.getElementById('log');
        
        try {
            logEl.innerText = "Buscando 'Reloj_Gamer'...";
            dispositivoBT = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'Reloj_Gamer' }],
                optionalServices: [SERVICE_UUID]
            });

            statusEl.innerText = "CONECTANDO...";
            const server = await dispositivoBT.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            caracteristicaBT = await service.getCharacteristic(CHAR_UUID);

            statusEl.innerText = "CONECTADO ✅";
            statusEl.style.color = "#00ff00";
            logEl.innerText = "Vinculado con éxito.";
        } catch (error) {
            console.error(error);
            statusEl.innerText = "ERROR ❌";
            logEl.innerText = "Error: " + error.message;
        }
    }

    async function enviar(letra) {
        if (!caracteristicaBT) {
            alert("Víncula el reloj primero");
            return;
        }
        try {
            let encoder = new TextEncoder();
            // Enviamos la letra. m.trim() en Arduino limpiará cualquier residuo.
            await caracteristicaBT.writeValue(encoder.encode(letra));
            document.getElementById('log').innerText = "Enviado: " + letra;
        } catch (error) {
            document.getElementById('log').innerText = "Fallo al enviar: " + letra;
            console.log(error);
        }
    }

    function toggleLED() {
        ledON = !ledON;
        const btn = document.getElementById('btnLED');
        btn.innerText = ledON ? "💡 CONTROL LED: ON" : "💡 CONTROL LED: OFF";
        btn.style.background = ledON ? "#00ff00" : "#6200ea";
        btn.style.color = ledON ? "#000" : "#fff";
        enviar(ledON ? 'L' : 'K');
    }
</script>

</body>
</html>
