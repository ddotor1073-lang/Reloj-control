<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control Reloj Gamer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: #e0e0e0; text-align: center; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        button { 
            padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer;
            background: #333; color: white; transition: all 0.2s ease; font-size: 14px;
        }
        button:active { transform: scale(0.95); background: #444; }
        .btn-connect { background: #007bff; width: 100%; margin-bottom: 20px; font-size: 16px; }
        .btn-led { background: #ff9800; color: #000; grid-column: span 2; font-size: 16px; }
        .btn-reloj { border: 2px solid #00ff00; color: #00ff00; }
        .status { font-size: 12px; color: #666; margin-bottom: 10px; }
        #log { font-family: monospace; font-size: 10px; color: #4caf50; margin-top: 15px; height: 40px; overflow: hidden; }
    </style>
</head>
<body>

<div class="container">
    <h1>🕹️ Gamer Watch</h1>
    <div id="status" class="status">Estado: Desconectado</div>
    <button class="btn-connect" onclick="conectarBT()">🔗 VINCULAR RELOJ</button>

    <div class="grid">
        <button class="btn-reloj" onclick="enviar('R')">🏠 INICIO / RELOJ</button>
        <button onclick="enviar('G')">📍 NAVEGACIÓN</button>
        <button onclick="enviar('C')">⏲️ TIMER / CRONO</button>
        <button onclick="enviar('I')">📊 SISTEMA</button>
        
        <button class="btn-led" id="btnLED" onclick="toggleLED()">💡 CONTROL LED: OFF</button>
        
        <button style="background:#444" onclick="enviar('S')">▶️ START CRONO</button>
        <button style="background:#444" onclick="enviar('P')">⏸️ STOP CRONO</button>
    </div>
    <div id="log"></div>
</div>

<script>
    let dispositivoBT = null;
    let caracteristicaBT = null;
    let ledON = false;

    // Estos son los UUIDs estándar para comunicación Serial sobre BLE (Nordic UART)
    // Chronos usa estos por defecto para recibir comandos.
    const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const CHAR_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e"; // TX Characteristic

    async function conectarBT() {
        try {
            console.log('Buscando reloj...');
            dispositivoBT = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'Reloj_Gamer' }], // El nombre que pusiste en ChronosESP32 chronos("Reloj_Gamer")
                optionalServices: [SERVICE_UUID]
            });

            document.getElementById('status').innerText = "Conectando...";
            const server = await dispositivoBT.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            caracteristicaBT = await service.getCharacteristic(CHAR_UUID);

            document.getElementById('status').innerText = "Estado: CONECTADO ✅";
            document.getElementById('status').style.color = "#00ff00";
        } catch (error) {
            console.log('Error:', error);
            document.getElementById('status').innerText = "Error de conexión";
        }
    }

    async function enviar(letra) {
        if (!caracteristicaBT) {
            alert("¡Primero vincula el reloj!");
            return;
        }
        try {
            let encoder = new TextEncoder();
            await caracteristicaBT.writeValue(encoder.encode(letra));
            document.getElementById('log').innerText = "Enviado: " + letra + " [" + new Date().toLocaleTimeString() + "]";
        } catch (error) {
            console.error("Error enviando:", error);
        }
    }

    function toggleLED() {
        ledON = !ledON;
        const btn = document.getElementById('btnLED');
        btn.innerText = ledON ? "💡 CONTROL LED: ON" : "💡 CONTROL LED: OFF";
        btn.style.background = ledON ? "#00ff00" : "#ff9800";
        enviar(ledON ? 'L' : 'K');
    }
</script>

</body>
</html>
